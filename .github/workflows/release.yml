name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ github.ref_name }}
          # Update Chart.yaml versions
          sed -i "s/^version:.*/version: ${VERSION}/" charts/cairn/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/cairn/Chart.yaml
          # Update default image tag in values.yaml (scoped to the image block)
          sed -i "s|^  tag:.*|  tag: \"${TAG}\"|" charts/cairn/values.yaml
          # Fetch subchart dependencies
          helm dependency update charts/cairn
          helm package charts/cairn

      - name: Push chart to GHCR
        run: helm push cairn-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/rebertim/charts

  jvm-agent:
    name: Build JVM Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build agent JAR
        working-directory: agent
        run: gradle build -PagentVersion=${GITHUB_REF_NAME}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: agent
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/rebertim/cairn-agent:${{ github.ref_name }}
            ${{ env.REGISTRY }}/rebertim/cairn-agent:latest