---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - replicasets
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rightsizing.cairn.io
  resources:
  - clusterrightsizepolicies
  - rightsizepolicies
  - rightsizerecommendations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rightsizing.cairn.io
  resources:
  - clusterrightsizepolicies/finalizers
  - rightsizepolicies/finalizers
  - rightsizerecommendations/finalizers
  verbs:
  - update
- apiGroups:
  - rightsizing.cairn.io
  resources:
  - clusterrightsizepolicies/status
  - rightsizepolicies/status
  - rightsizerecommendations/status
  verbs:
  - get
  - patch
  - update
