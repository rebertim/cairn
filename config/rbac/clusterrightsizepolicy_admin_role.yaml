# This rule is not used by the project cairn itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over rightsizing.cairn.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cairn
    app.kubernetes.io/managed-by: kustomize
  name: clusterrightsizepolicy-admin-role
rules:
- apiGroups:
  - rightsizing.cairn.io
  resources:
  - clusterrightsizepolicies
  verbs:
  - '*'
- apiGroups:
  - rightsizing.cairn.io
  resources:
  - clusterrightsizepolicies/status
  verbs:
  - get
