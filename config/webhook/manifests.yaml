---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-rightsizing-cairn-io-v1alpha1-rightsizepolicy
  failurePolicy: Fail
  name: mrightsizepolicy-v1alpha1.kb.io
  rules:
  - apiGroups:
    - rightsizing.cairn.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - rightsizepolicies
  sideEffects: None
