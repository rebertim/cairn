controllerManager:
  manager:
    args:
    - --metrics-bind-address=:8080
    - --leader-elect
    - --health-probe-bind-address=:8081
    - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
    - --agent-image=ghcr.io/rebertim/cairn-agent:latest
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: true
    env:
      # When kube-prometheus-stack.enabled is true this is set automatically.
      # Set this explicitly only when using an external Prometheus instance
      # (kube-prometheus-stack.enabled: false).
      prometheusUrl: ""
      # How often the policy controller polls workloads and recomputes recommendations
      reconcileInterval: "2m"
      # cairn-agent JAR image injected into detected Java pods
      agentImage: "ghcr.io/rebertim/cairn-agent:latest"
    image:
      repository: ghcr.io/rebertim/cairn
      tag: ""
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  nodeSelector: {}
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  replicas: 1
  tolerations: []
  topologySpreadConstraints: []
kubernetesClusterDomain: cluster.local
metricsService:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  type: ClusterIP
serviceAccount:
  annotations: {}
  automount: true
  create: true
  name: ""
webhookService:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  type: ClusterIP

# ---------------------------------------------------------------------------
# Bundled monitoring stack (kube-prometheus-stack)
# ---------------------------------------------------------------------------
# Enabled by default so a fresh install gets Prometheus + Grafana out of the
# box. Set enabled: false and provide controllerManager.manager.env.prometheusUrl
# to use an existing Prometheus instance instead.
kube-prometheus-stack:
  enabled: true
  alertmanager:
    enabled: false
  prometheus:
    prometheusSpec:
      # Only watch monitors labelled cairn.io/monitor=true — keeps this
      # Prometheus instance scoped to Cairn and avoids double-scraping when
      # an existing Prometheus is already present in the cluster.
      serviceMonitorSelector:
        matchLabels:
          cairn.io/monitor: "true"
      serviceMonitorNamespaceSelector: {}
      podMonitorSelector:
        matchLabels:
          cairn.io/monitor: "true"
      podMonitorNamespaceSelector: {}
  grafana:
    enabled: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        searchNamespace: ALL
