controllerManager:
  manager:
    args:
      - --metrics-bind-address=:8080
      - --metrics-secure=false
      - --leader-elect
      - --health-probe-bind-address=:8081
      - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
      - --agent-image=ghcr.io/rebertim/cairn-agent:latest
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
    env:
      # How often the policy controller polls workloads and recomputes recommendations
      reconcileInterval: "2m"
      # How far back in time the cluster-wide metrics cache fetches data
      metricsCacheWindow: "24h"
      # How often the metrics cache is refreshed in the background
      metricsCacheInterval: "5m"
    image:
      repository: ghcr.io/rebertim/cairn
      tag: ""
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  podAnnotations: {}
  nodeSelector: {}
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  replicas: 1
  tolerations: []
  topologySpreadConstraints: []
kubernetesClusterDomain: cluster.local
metricsService:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
  type: ClusterIP
serviceAccount:
  annotations: {}
  automount: true
  create: true
  name: ""
webhookService:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  type: ClusterIP

# ---------------------------------------------------------------------------
# Bundled monitoring stack (victoria-metrics-k8s-stack)
# ---------------------------------------------------------------------------
victoria-metrics-k8s-stack:
  # Admission webhooks are disabled by default to avoid a bootstrap deadlock:
  # the operator registers webhooks that call back into itself, so if the pod
  # is not yet ready the entire rollout is blocked. Schema validation is
  # unnecessary here since only the chart creates VM objects.
  victoria-metrics-operator:
    admissionWebhooks:
      enabled: false
  vmsingle:
    enabled: true
    spec:
      retentionPeriod: "1"
  vmalert:
    enabled: false
  vmalertmanager:
    enabled: false
  vmagent:
    enabled: true
  prometheus-node-exporter:
    enabled: true
  grafana:
    enabled: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        searchNamespace: ALL
