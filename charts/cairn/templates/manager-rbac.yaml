apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cairn.fullname" . }}-manager-role
  labels:
  {{- include "cairn.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - statefulsets
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rightsizing.cairn.io
  resources:
  - clusterrightsizepolicies
  - rightsizepolicies
  - rightsizerecommendations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rightsizing.cairn.io
  resources:
  - clusterrightsizepolicies/finalizers
  - rightsizepolicies/finalizers
  - rightsizerecommendations/finalizers
  verbs:
  - update
- apiGroups:
  - rightsizing.cairn.io
  resources:
  - clusterrightsizepolicies/status
  - rightsizepolicies/status
  - rightsizerecommendations/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cairn.fullname" . }}-manager-rolebinding
  labels:
  {{- include "cairn.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "cairn.fullname" . }}-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "cairn.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
