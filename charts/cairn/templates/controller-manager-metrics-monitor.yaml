apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cairn.fullname" . }}-controller-manager-metrics-monitor
  labels:
    control-plane: controller-manager
    cairn.io/monitor: "true"
  {{- include "cairn.labels" . | nindent 4 }}
spec:
  endpoints:
  - path: /metrics
    port: http
    scheme: http
  selector:
    matchLabels:
      app.kubernetes.io/name: cairn
      control-plane: controller-manager
