apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rightsizepolicies.rightsizing.cairn.io
  annotations:
    "helm.sh/resource-policy": keep
    controller-gen.kubebuilder.io/version: v0.20.1
  labels:
  {{- include "cairn.labels" . | nindent 4 }}
spec:
  group: rightsizing.cairn.io
  names:
    kind: RightsizePolicy
    listKind: RightsizePolicyList
    plural: rightsizepolicies
    singular: rightsizepolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.targetRef.kind
      name: Target
      type: string
    - jsonPath: .status.targetedWorkloads
      name: Workloads
      type: integer
    - jsonPath: .status.recommendationsReady
      name: Ready
      type: integer
    - jsonPath: .spec.suspended
      name: Suspended
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RightsizePolicy is the Schema for the rightsizepolicies API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of RightsizePolicy
            properties:
              changeThreshold:
                default: 10
                description: |-
                  ChangeThreshold is the minimum percentage change between current and
                  recommended resources required to trigger an apply. Avoids churn
                  from insignificant fluctuations.
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              containers:
                description: Containers defines the resource policies for CPU and
                  memory.
                properties:
                  cpu:
                    description: CPU resource policy.
                    properties:
                      headroomPercent:
                        default: 15
                        description: |-
                          HeadroomPercent is the additional headroom to add on top of the
                          calculated percentile, as a percentage.
                        format: int32
                        maximum: 200
                        minimum: 0
                        type: integer
                      maxRequest:
                        anyOf:
                        - type: integer
                        - type: string
                        description: MaxRequest is the ceiling for the recommended
                          request.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      minRequest:
                        anyOf:
                        - type: integer
                        - type: string
                        description: MinRequest is the floor for the recommended request.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      percentile:
                        default: 95
                        description: Percentile of usage to base the recommendation
                          on.
                        format: int32
                        maximum: 100
                        minimum: 1
                        type: integer
                    type: object
                  memory:
                    description: Memory resource policy.
                    properties:
                      headroomPercent:
                        default: 15
                        description: |-
                          HeadroomPercent is the additional headroom to add on top of the
                          calculated percentile, as a percentage.
                        format: int32
                        maximum: 200
                        minimum: 0
                        type: integer
                      maxRequest:
                        anyOf:
                        - type: integer
                        - type: string
                        description: MaxRequest is the ceiling for the recommended
                          request.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      minRequest:
                        anyOf:
                        - type: integer
                        - type: string
                        description: MinRequest is the floor for the recommended request.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      percentile:
                        default: 95
                        description: Percentile of usage to base the recommendation
                          on.
                        format: int32
                        maximum: 100
                        minimum: 1
                        type: integer
                    type: object
                type: object
              java:
                description: Java configures JVM-aware rightsizing.
                properties:
                  enabled:
                    default: true
                    description: Enabled toggles JVM-aware rightsizing for detected
                      Java containers.
                    type: boolean
                  flagMethod:
                    default: env
                    description: FlagMethod controls how JVM flags are delivered to
                      containers.
                    type: string
                  gcOverheadWeight:
                    anyOf:
                    - type: integer
                    - type: string
                    default: "1.0"
                    description: |-
                      GCOverheadWeight controls how much GC pressure inflates the CPU
                      recommendation. 0 disables the factor, 1.0 is the default weight.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  heapHeadroomPercent:
                    default: 15
                    description: HeapHeadroomPercent is the headroom to add on top
                      of observed heap usage.
                    format: int32
                    maximum: 200
                    minimum: 0
                    type: integer
                  injectAgent:
                    default: true
                    description: |-
                      InjectAgent controls whether the JVM metrics agent is automatically
                      injected into Java containers via mutating webhook.
                    type: boolean
                  manageJvmFlags:
                    default: false
                    description: |-
                      ManageJVMFlags enables recommending and applying JVM flags
                      (-Xmx, -XX:MaxMetaspaceSize, etc.).
                    type: boolean
                  pinHeapMinMax:
                    default: true
                    description: PinHeapMinMax sets -Xms equal to -Xmx for predictable
                      memory behavior.
                    type: boolean
                type: object
              minApplyInterval:
                description: |-
                  MinApplyInterval is the minimum time between consecutive applies for a
                  workload. Prevents rapid-fire restarts when the recommendation keeps
                  changing during a load spike. Defaults to 5 minutes.
                type: string
              minObservationWindow:
                description: |-
                  MinObservationWindow is how long data must have been collected before
                  the first auto apply is allowed. Prevents premature right-sizing based
                  on an incomplete metrics window. Defaults to 24 hours.
                type: string
              mode:
                default: recommend
                type: string
              suspended:
                default: false
                description: Suspended pauses all rightsizing activity for this policy.
                type: boolean
              targetRef:
                description: TargetRef identifies which workloads this policy applies
                  to.
                properties:
                  kind:
                    description: Kind of the target workload.
                    enum:
                    - Deployment
                    - StatefulSet
                    - DaemonSet
                    - Rollout
                    type: string
                  labelSelector:
                    description: |-
                      LabelSelector further filters which workloads to target.
                      Only used when Name is "*".
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                  name:
                    default: '*'
                    description: |-
                      Name of the target workload. Use "*" to match all workloads of the
                      specified kind in the namespace.
                    type: string
                required:
                - kind
                - name
                type: object
              updateStrategy:
                default: restart
                description: UpdateStrategy defines how changes are applied when mode
                  is "auto".
                type: string
              window:
                default: 168h
                description: Window is the lookback duration for metrics aggregation.
                type: string
            required:
            - targetRef
            type: object
          status:
            description: status defines the observed state of RightsizePolicy
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastReconcileTime:
                description: LastReconcileTime is the timestamp of the last successful
                  reconciliation.
                format: date-time
                type: string
              recommendationsReady:
                description: RecommendationsReady is the number of workloads with
                  ready recommendations.
                format: int32
                type: integer
              targetedWorkloads:
                description: TargetedWorkloads is the number of workloads matched
                  by this policy.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
