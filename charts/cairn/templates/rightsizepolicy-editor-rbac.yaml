apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cairn.fullname" . }}-rightsizepolicy-editor-role
  labels:
  {{- include "cairn.labels" . | nindent 4 }}
rules:
- apiGroups:
  - rightsizing.cairn.io
  resources:
  - rightsizepolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rightsizing.cairn.io
  resources:
  - rightsizepolicies/status
  verbs:
  - get
