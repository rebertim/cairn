                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        nonHeapUsedP99:
                          anyOf:
                          - type: integer
                          - type: string
                          description: NonHeapUsedP99 is the P99 non-heap (metaspace
                            + codecache) usage.
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        peakThreadCount:
                          description: PeakThreadCount is the observed peak thread
                            count.
                          format: int32
                          type: integer
                        recommendedFlags:
                          description: RecommendedFlags are the recommended JVM flags.
                          properties:
                            maxDirectMemorySize:
                              description: MaxDirectMemorySize is -XX:MaxDirectMemorySize.
                              type: string
                            maxMetaspaceSize:
                              description: MaxMetaspaceSize is -XX:MaxMetaspaceSize.
                              type: string
                            reservedCodeCacheSize:
                              description: ReservedCodeCacheSize is -XX:ReservedCodeCacheSize.
                              type: string
                            xms:
                              description: Xms is the initial heap size (-Xms).
                              type: string
                            xmx:
                              description: Xmx is the maximum heap size (-Xmx).
                              type: string
                          type: object
                      required:
                      - agentInjected
                      - detected
                      type: object
                    lowerBound:
                      description: |-
                        LowerBound is the minimum recommended resources. Going below this
                        risks OOMKills or CPU throttling.
                      properties:
                        cpu:
                          anyOf:
                          - type: integer
                          - type: string
                          description: CPU resource quantity.
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        memory:
                          anyOf:
                          - type: integer
                          - type: string
                          description: Memory resource quantity.
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                      type: object
                    recommended:
                      description: Recommended holds the calculated resource recommendations.
                      properties:
                        claims:
                          description: |-
                            Claims lists the names of resources, defined in spec.resourceClaims,
                            that are used by this container.

                            This field depends on the
                            DynamicResourceAllocation feature gate.

                            This field is immutable. It can only be set for containers.
                          items:
                            description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                            properties:
                              name:
                                description: |-
                                  Name must match the name of one entry in pod.spec.resourceClaims of
                                  the Pod where this field is used. It makes that resource available
                                  inside a container.
                                type: string
                              request:
                                description: |-
                                  Request is the name chosen for a request in the referenced claim.
                                  If empty, everything from the claim is made available, otherwise
                                  only the result of this request.
                                type: string
                            required:
                            - name
                            type: object
                          type: array
                          x-kubernetes-list-map-keys:
                          - name
                          x-kubernetes-list-type: map
                        limits:
                          additionalProperties:
                            anyOf:
                            - type: integer
                            - type: string
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          description: |-
                            Limits describes the maximum amount of compute resources allowed.
                            More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                          type: object
                        requests:
                          additionalProperties:
                            anyOf:
                            - type: integer
                            - type: string
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          description: |-
                            Requests describes the minimum amount of compute resources required.
                            If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                            otherwise to an implementation-defined value. Requests cannot exceed Limits.
                            More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                          type: object
                      type: object
                    upperBound:
                      description: |-
                        UpperBound is the maximum recommended resources. Going above this
                        is wasteful.
                      properties:
                        cpu:
                          anyOf:
                          - type: integer
                          - type: string
                          description: CPU resource quantity.
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        memory:
                          anyOf:
                          - type: integer
                          - type: string
                          description: Memory resource quantity.
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                      type: object
                  required:
                  - containerName
                  - current
                  type: object
                type: array
              dataReadySince:
                description: |-
                  DataReadySince is when the recommendation first produced non-empty
                  container data. The actuator will not auto-apply until
                  MinObservationWindow has elapsed since this timestamp.
                format: date-time
                type: string
              lastAppliedTime:
                description: |-
                  LastAppliedTime is when the recommendation was last applied to the
                  workload. Nil if never applied.
                format: date-time
                type: string
              lastRecommendationTime:
                description: LastRecommendationTime is when the recommendation was
                  last computed.
                format: date-time
                type: string
              savings:
                description: |-
                  Savings is the projected resource savings if all recommendations
                  in this object are applied.
                properties:
                  cpuMillis:
                    description: CPUMillis is the total CPU savings in millicores.
                    format: int64
                    type: integer
                  memoryMiB:
                    description: MemoryMiB is the total memory savings in MiB.
                    format: int64
                    type: integer
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
