                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        burstStartTime:
                          format: date-time
                          type: string
                        phase:
                          type: string
                      required:
                      - phase
                      type: object
                    containerName:
                      description: ContainerName is the name of the container.
                      type: string
                    current:
                      description: Current holds the resources currently set on the
                        container.
                      properties:
                        claims:
                          description: |-
                            Claims lists the names of resources, defined in spec.resourceClaims,
                            that are used by this container.

                            This field depends on the
                            DynamicResourceAllocation feature gate.

                            This field is immutable. It can only be set for containers.
                          items:
                            description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                            properties:
                              name:
                                description: |-
                                  Name must match the name of one entry in pod.spec.resourceClaims of
                                  the Pod where this field is used. It makes that resource available
                                  inside a container.
                                type: string
                              request:
                                description: |-
                                  Request is the name chosen for a request in the referenced claim.
                                  If empty, everything from the claim is made available, otherwise
                                  only the result of this request.
                                type: string
                            required:
                            - name
                            type: object
                          type: array
                          x-kubernetes-list-map-keys:
                          - name
                          x-kubernetes-list-type: map
                        limits:
                          additionalProperties:
                            anyOf:
                            - type: integer
                            - type: string
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          description: |-
                            Limits describes the maximum amount of compute resources allowed.
                            More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                          type: object
                        requests:
                          additionalProperties:
                            anyOf:
                            - type: integer
                            - type: string
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          description: |-
                            Requests describes the minimum amount of compute resources required.
                            If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                            otherwise to an implementation-defined value. Requests cannot exceed Limits.
                            More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                          type: object
                      type: object
                    jvm:
                      description: |-
                        JVM contains JVM-specific recommendation data.
                        Only populated for detected Java containers.
                      properties:
                        agentInjected:
                          description: AgentInjected indicates whether the Cairn JVM
                            agent was injected.
                          type: boolean
                        currentFlags:
                          description: CurrentFlags are the JVM flags currently observed
                            on the container.
                          properties:
                            maxDirectMemorySize:
                              description: MaxDirectMemorySize is -XX:MaxDirectMemorySize.
                              type: string
                            maxMetaspaceSize:
                              description: MaxMetaspaceSize is -XX:MaxMetaspaceSize.
                              type: string
                            reservedCodeCacheSize:
                              description: ReservedCodeCacheSize is -XX:ReservedCodeCacheSize.
                              type: string
                            xms:
                              description: Xms is the initial heap size (-Xms).
                              type: string
                            xmx:
                              description: Xmx is the maximum heap size (-Xmx).
                              type: string
                          type: object
                        detected:
                          description: |-
                            Detected indicates whether this container was identified as a
                            Java application.
                          type: boolean
                        gcOverheadPercent:
                          anyOf:
                          - type: integer
                          - type: string
                          description: GCOverheadPercent is the percentage of time
