apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rightsizerecommendations.rightsizing.cairn.io
  annotations:
    "helm.sh/resource-policy": keep
    controller-gen.kubebuilder.io/version: v0.20.1
  labels:
  {{- include "cairn.labels" . | nindent 4 }}
spec:
  group: rightsizing.cairn.io
  names:
    kind: RightsizeRecommendation
    listKind: RightsizeRecommendationList
    plural: rightsizerecommendations
    singular: rightsizerecommendation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.kind
      name: Target
      type: string
    - jsonPath: .spec.targetRef.name
      name: Workload
      type: string
    - jsonPath: .spec.policyRef.name
      name: Policy
      type: string
    - jsonPath: .status.savings.cpuMillis
      name: CPU Savings
      type: integer
    - jsonPath: .status.savings.memoryMiB
      name: Mem Savings (MiB)
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of RightsizeRecommendation
            properties:
              policyRef:
                description: PolicyReference identifies which policy generated this
                  recommendation.
                properties:
                  kind:
                    description: Kind is either RightsizePolicy or ClusterRightsizePolicy.
                    type: string
                  name:
                    description: Name of the policy.
                    type: string
                  namespace:
                    description: Namespace of the policy. Empty for ClusterRightsizePolicy.
                    type: string
                required:
                - kind
                - name
                type: object
              targetRef:
                description: TargetRef identifies the workload(s) to rightsize.
                properties:
                  kind:
                    description: Kind of the target workload.
                    enum:
                    - Deployment
                    - StatefulSet
                    - DaemonSet
                    - Rollout
                    type: string
                  labelSelector:
                    description: |-
                      LabelSelector further filters which workloads to target.
                      Only used when Name is "*".
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                  name:
                    default: '*'
                    description: |-
                      Name of the target workload. Use "*" to match all workloads of the
                      specified kind in the namespace.
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - policyRef
            - targetRef
            type: object
