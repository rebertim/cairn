{{- if and (index .Values "kube-prometheus-stack" "enabled") (index .Values "kube-prometheus-stack" "grafana" "enabled") (index .Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "enabled") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cairn.fullname" . }}-dashboard
  labels:
    {{ index .Values "kube-prometheus-stack" "grafana" "sidecar" "dashboards" "label" }}: "1"
  {{- include "cairn.labels" . | nindent 4 }}
data:
  cairn-dashboard.json: |-
{{ .Files.Get "dashboards/cairn-dashboard.json" | indent 4 }}
{{- end }}
