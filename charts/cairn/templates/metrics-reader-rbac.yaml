apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cairn.fullname" . }}-metrics-reader
  labels:
  {{- include "cairn.labels" . | nindent 4 }}
rules:
- nonResourceURLs:
  - /metrics
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cairn.fullname" . }}-metrics-reader
  labels:
  {{- include "cairn.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cairn.fullname" . }}-metrics-reader
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-victoria-metrics-k8s-stack-vmagent
  namespace: {{ .Release.Namespace }}
